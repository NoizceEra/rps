name: Build RPS Solana Program

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SOLANA_VERSION: "2.1.0"
  RUST_TOOLCHAIN: "nightly"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI (Agave)
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          # Download release tarball directly from GitHub CDN (faster than anza.xyz installer)
          curl -L --retry 3 \
            "https://github.com/anza-xyz/agave/releases/download/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            -o /tmp/solana.tar.bz2
          mkdir -p ~/.local/share/solana/install
          tar -xjf /tmp/solana.tar.bz2 -C ~/.local/share/solana/install
          mv ~/.local/share/solana/install/solana-release \
             ~/.local/share/solana/install/active_release

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build RPS program
        run: |
          # Use system nightly cargo (supports edition2024) instead of
          # the bundled Cargo 1.79 that ships with platform-tools v1.43
          export CARGO=$(rustup which --toolchain nightly cargo)
          echo "Using cargo: $CARGO"
          $CARGO --version
          solana --version
          # Build using cargo-build-sbf with overridden cargo
          cargo-build-sbf --manifest-path programs/rps/Cargo.toml
          # List output
          ls -la target/deploy/

      - name: Extract Program ID
        run: |
          echo "Keypair-derived Program ID:"
          solana-keygen pubkey target/deploy/rps-keypair.json

      - name: Upload program binary
        uses: actions/upload-artifact@v4
        with:
          name: rps-program
          path: |
            target/deploy/rps.so
            target/idl/rps.json
          retention-days: 30

      - name: Upload keypair (for deployment)
        uses: actions/upload-artifact@v4
        with:
          name: rps-keypair
          path: target/deploy/rps-keypair.json
          retention-days: 7
