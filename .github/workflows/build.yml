name: Build RPS Solana Program

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Agave 3.1.12 ships platform-tools v1.52 (Rust 1.89.0) which supports
  # edition2024 and satisfies rust-version ≥ 1.85 for modern crates
  SOLANA_VERSION: "3.1.12"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI (Agave ${{ env.SOLANA_VERSION }})
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          curl -L --retry 3 \
            "https://github.com/anza-xyz/agave/releases/download/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            -o /tmp/solana.tar.bz2
          mkdir -p ~/.local/share/solana/install
          tar -xjf /tmp/solana.tar.bz2 -C ~/.local/share/solana/install
          mv ~/.local/share/solana/install/solana-release \
             ~/.local/share/solana/install/active_release

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build RPS program
        run: |
          solana --version
          cargo-build-sbf --manifest-path programs/rps/Cargo.toml
          ls -la target/deploy/

      - name: Extract Program ID
        run: |
          echo "Program ID:"
          solana-keygen pubkey target/deploy/rps-keypair.json

      - name: Upload program binary
        uses: actions/upload-artifact@v4
        with:
          name: rps-program
          path: |
            target/deploy/rps.so
            target/idl/rps.json
          retention-days: 30

      - name: Upload keypair (for deployment)
        uses: actions/upload-artifact@v4
        with:
          name: rps-keypair
          path: target/deploy/rps-keypair.json
          retention-days: 7
